server:
  port: 8082

spring:
  application:
    name: finance-service
  datasource:
    url: jdbc:postgresql://localhost:5432/finance_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    fail-on-missing-locations: true

  main:
    allow-bean-definition-overriding: true

logging:
  level:
    org.springframework.web: DEBUG

gateway:
  secret: finsmart-cok-gizli-arka-kapi-anahtari

feign:
  client:
    config:
      default:
        loggerLevel: full
  httpClient:
    enabled: true