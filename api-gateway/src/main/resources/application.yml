server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: finance-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/finance/**
          filters:
            - name: AuthenticationFilter

jwt:
  secret: fin-smart-cok-gizli-ve-guclu-bir-anahtar-kelime-buraya-cok-daha-uzun-olmalı

gateway:
  secret: finsmart-cok-gizli-arka-kapi-anahtari